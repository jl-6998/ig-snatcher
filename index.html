<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>J.L Premium Downloader</title>
  <style>
    /* Premium Modern Dark Theme */
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0f0f11; color: #ffffff; padding: 20px; margin: 0; }
    .container { max-width: 600px; margin: 0 auto; }
    h2 { text-align: center; font-size: 28px; background: linear-gradient(90deg, #0095f6, #e1306c); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 30px; }
    .step-label { font-size: 14px; font-weight: bold; color: #aaa; margin-bottom: 8px; display: block; }
    input, button { width: 100%; margin-bottom: 25px; padding: 15px; border-radius: 12px; border: 1px solid #333; box-sizing: border-box; font-size: 15px; background-color: #1a1a1d; color: #fff; transition: all 0.3s ease; }
    input:focus { outline: none; border-color: #0095f6; box-shadow: 0 0 8px rgba(0, 149, 246, 0.3); }
    .btn-main { background: linear-gradient(90deg, #0095f6, #007bb5); color: white; font-weight: bold; font-size: 18px; cursor: pointer; border: none; box-shadow: 0 4px 15px rgba(0, 149, 246, 0.4); }
    .btn-main:active { transform: scale(0.98); }
    .btn-clear { background: linear-gradient(90deg, #e1306c, #c13584); color: white; font-weight: bold; font-size: 16px; cursor: pointer; border: none; box-shadow: 0 4px 15px rgba(225, 48, 108, 0.4); }
    .btn-clear:active { transform: scale(0.98); }
    
    .spinner-wrapper { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px 0; }
    .spinner { width: 48px; height: 48px; border: 4px solid #333; border-top: 4px solid #0095f6; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .spinner-wrapper p { margin-top: 12px; color: #aaa; font-size: 14px; }
    
    #results { margin-top: 20px; }
    .raw-dump { height: 300px; width: 100%; background: #121215; color: #00ff00; font-family: monospace; font-size: 12px; border: 1px solid #333; padding: 10px; border-radius: 8px; overflow-y: scroll; resize: none; }
  </style>
</head>
<body>
  <div class="container">
    <h2>J.L Premium Downloader</h2>
    
    <label class="step-label">Paste IG Link (Post, Reel, or Story)</label>
    <input id="igLink" type="text" placeholder="https://instagram.com/...">
    
    <button class="btn-main" onclick="sendToBackend()">Download Media</button>
    <button class="btn-clear" onclick="clearAll()">Clear</button>

    <div id="results"></div>
  </div>

  <script>
    function clearAll() {
      document.getElementById('igLink').value = '';
      document.getElementById('results').innerHTML = '';
    }

    async function sendToBackend() {
      let link = document.getElementById('igLink').value;
      let resultDiv = document.getElementById('results');
      
      if (!link) {
        alert("Drop the IG link first, bro!");
        return;
      }

      resultDiv.innerHTML = `<div class="spinner-wrapper"><div class="spinner"></div><p>Hitting the Premium Servers... 🚀</p></div>`;

      try {
        let response = await fetch('https://seeyha.pythonanywhere.com/snatch', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ link: link })
        });
        
        let result = await response.json();
        
        if (result.status === "success") {
          // This dumps the green JSON code on the screen so we can map it
          resultDiv.innerHTML = `<textarea class="raw-dump" readonly>${JSON.stringify(result.raw_data, null, 2)}</textarea>
                                 <p style="text-align:center; color: #aaa; margin-top: 10px;">Screenshot this text so we can build the final video card!</p>`;
        } else {
          resultDiv.innerHTML = `<p style="text-align: center; color: #ff4d4d;">${result.message}</p>`;
        }
      } catch (error) {
        resultDiv.innerHTML = `<p style="text-align: center; color: #ff4d4d;">Couldn't reach server. Make sure PythonAnywhere is running!</p>`;
      }
    }
  </script>
</body>
</html>
