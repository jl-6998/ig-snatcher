<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>J.L Downloader</title>
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0f0f11; color: #ffffff; padding: 20px; margin: 0; }
    .container { max-width: 600px; margin: 0 auto; }
    h2 { text-align: center; font-size: 28px; background: linear-gradient(90deg, #0095f6, #e1306c); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 20px; }
    
    .tab-container { display: flex; justify-content: space-between; margin-bottom: 25px; background: #1a1a1d; border-radius: 12px; padding: 5px; border: 1px solid #333; }
    .tab-btn { flex: 1; padding: 12px; background: transparent; border: none; color: #aaa; font-weight: bold; font-size: 15px; cursor: pointer; border-radius: 8px; transition: 0.3s; }
    .tab-btn.active { background: linear-gradient(90deg, #0095f6, #e1306c); color: white; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
    
    .step-label { font-size: 14px; font-weight: bold; color: #aaa; margin-bottom: 8px; display: block; }
    input, textarea, button { width: 100%; margin-bottom: 20px; padding: 15px; border-radius: 12px; border: 1px solid #333; box-sizing: border-box; font-size: 15px; background-color: #1a1a1d; color: #fff; }
    input:focus, textarea:focus { outline: none; border-color: #0095f6; }
    input[readonly] { background-color: #121215; color: #00ff00; border-color: #222; font-weight: bold; text-align: center;}
    textarea { height: 120px; resize: none; font-family: monospace; font-size: 13px; }
    
    .btn-main { background: linear-gradient(90deg, #0095f6, #007bb5); color: white; font-weight: bold; font-size: 18px; cursor: pointer; border: none; box-shadow: 0 4px 15px rgba(0, 149, 246, 0.4); }
    .btn-main:active { transform: scale(0.98); }
    .btn-clear { background: linear-gradient(90deg, #e1306c, #c13584); color: white; font-weight: bold; font-size: 16px; cursor: pointer; border: none; }
    
    .section { display: none; }
    .section.active { display: block; }

    #results { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-top: 20px; }
    .media-card { background: #1e1e24; border-radius: 12px; overflow: hidden; border: 1px solid #333; display: flex; flex-direction: column; }
    .preview-container { width: 100%; min-height: 160px; height: auto; background: #000; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
    .preview-container img { width: 100%; height: 100%; object-fit: cover; }
    .preview-container video { width: 100%; height: 100%; object-fit: contain; }
    
    .action-row { display: flex; width: 100%; border-top: 1px solid #333; }
    .download-link { flex: 1; padding: 12px 5px; background: #0095f6; color: white; text-decoration: none; font-weight: 600; font-size: 14px; text-align: center; border: none; cursor: pointer; border-right: 1px solid #1e1e24;}
    .download-link:hover { background: #007bb5; }
    
    .thumb-btn { background: linear-gradient(90deg, #e1306c, #c13584); display: block; width: 100%; padding: 10px; text-align: center; color: white; text-decoration: none; font-weight: bold; font-size: 14px; border-top: 1px solid #333;}
    .thumb-btn:hover { background: #c13584; }

    .spinner { width: 40px; height: 40px; border: 4px solid #333; border-top: 4px solid #0095f6; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 20px auto; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="container">
    <h2>J.L Downloader</h2>
    
    <div class="tab-container">
      <button class="tab-btn active" onclick="switchMode('public')" id="tab-public">🌍 Public</button>
      <button class="tab-btn" onclick="switchMode('private')" id="tab-private">🕵️‍♂️ Private</button>
    </div>

    <div id="ui-public" class="section active">
      <label class="step-label">Fast Download (Public Reels/Posts/Stories)</label>
      <input id="publicLink" type="text" placeholder="https://instagram.com/p/...">
      <button class="btn-main" onclick="runPublic()">🚀 Snatch Public Media</button>
    </div>

    <div id="ui-private" class="section">
      <label class="step-label">Step 1: Paste Private IG Link</label>
      <input id="privateLink" type="text" placeholder="https://instagram.com/p/..." oninput="generateSource()">
      
      <label class="step-label">Step 2: Link auto-copies! Open in a new tab</label>
      <input id="sourceLink" type="text" readonly placeholder="Waiting for link...">
      
      <label class="step-label">Step 3: Paste raw JSON code here</label>
      <textarea id="rawCode" placeholder="Dump the code here..."></textarea>
      
      <button class="btn-main" onclick="runPrivate()">🕵️‍♂️ Snatch Private Media</button>
    </div>

    <button class="btn-clear" onclick="clearAll()">Clear All</button>

    <div id="results"></div>
  </div>

  <script>
    function switchMode(mode) {
      document.getElementById('ui-public').classList.remove('active');
      document.getElementById('ui-private').classList.remove('active');
      document.getElementById('tab-public').classList.remove('active');
      document.getElementById('tab-private').classList.remove('active');
      
      document.getElementById(`ui-${mode}`).classList.add('active');
      document.getElementById(`tab-${mode}`).classList.add('active');
      document.getElementById('results').innerHTML = '';
    }

    function clearAll() {
      document.getElementById('publicLink').value = '';
      document.getElementById('privateLink').value = '';
      document.getElementById('sourceLink').value = '';
      document.getElementById('rawCode').value = '';
      document.getElementById('results').innerHTML = '';
    }

    // Auto-Copy GraphQL Link
    function generateSource() {
      let link = document.getElementById('privateLink').value;
      let targetInput = document.getElementById('sourceLink');
      let finalLink = "";

      if (link.includes('/stories/')) {
        finalLink = "view-source:" + link;
      } else {
        let match = link.match(/(?:p|reel|tv)\/([a-zA-Z0-9_-]+)/);
        if(match && match[1]) {
          let vars = JSON.stringify({"shortcode": match[1], "fetch_tagged_user_count": null, "hoisted_comment_id": null, "hoisted_reply_id": null});
          finalLink = `https://www.instagram.com/graphql/query/?doc_id=8845758582119845&variables=${encodeURIComponent(vars)}`;
        } else {
          targetInput.value = ""; return;
        }
      }

      navigator.clipboard.writeText(finalLink).then(() => {
          targetInput.value = "✅ Copied! Open in new tab";
      }).catch(err => {
          targetInput.value = finalLink; 
      });
    }

    async function runPublic() {
      let link = document.getElementById('publicLink').value;
      if(!link) return alert("Drop the link first!");
      await fetchBackend({ link: link });
    }

    async function runPrivate() {
      let code = document.getElementById('rawCode').value;
      if(!code) return alert("Paste the raw code first!");
      await fetchBackend({ raw_data: code });
    }

    async function fetchBackend(payload) {
      let resDiv = document.getElementById('results');
      resDiv.innerHTML = `<div style="grid-column: span 2; text-align:center;"><div class="spinner"></div><p>Snatching media... ⏳</p></div>`;

      try {
        let response = await fetch('https://seeyha.pythonanywhere.com/snatch', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        
        let result = await response.json();
        resDiv.innerHTML = ""; 
        
        if (result.status === "success") {
          let mediaLinks = [];

          let sourceData = null;
          if (result.mode === "public") {
              sourceData = result.raw_data;
          } else if (result.mode === "private") {
              try { sourceData = JSON.parse(document.getElementById('rawCode').value); } 
              catch(e) { sourceData = null; }
          }

          if (sourceData) {
            // THE UPGRADED SCANNER: Catches Reels, Posts, and weird Story formats!
            function dig(obj) {
              if (!obj || typeof obj !== 'object') return;
              
              if (obj.video_url) {
                  mediaLinks.push({ type: 'video', url: obj.video_url, thumb: obj.thumbnail_url || obj.display_url || '' });
              } else if (obj.video_versions && obj.video_versions.length > 0 && obj.video_versions[0].url) {
                  mediaLinks.push({ type: 'video', url: obj.video_versions[0].url, thumb: '' });
              } else if (obj.display_url && !obj.video_url) {
                  mediaLinks.push({ type: 'image', url: obj.display_url });
              } else if (obj.image_versions2 && obj.image_versions2.candidates && obj.image_versions2.candidates.length > 0) {
                  if (!obj.video_versions) {
                      mediaLinks.push({ type: 'image', url: obj.image_versions2.candidates[0].url });
                  }
              }

              for (let key in obj) if (typeof obj[key] === 'object') dig(obj[key]);
            }
            dig(sourceData);
          } else if (result.mode === "private" && result.links) {
             mediaLinks = result.links.map(l => ({ type: l.includes('.mp4') ? 'video' : 'image', url: l, thumb: '' }));
          }

          let unique = [];
          let seen = new Set();
          mediaLinks.forEach(m => { if(!seen.has(m.url)){ seen.add(m.url); unique.push(m); }});

          if(unique.length === 0) return resDiv.innerHTML = `<p style="grid-column: span 2; color: red;">Media not found bro. Account might be private or API missed it.</p>`;
          
          unique.forEach(media => {
            let card = document.createElement('div'); card.className = "media-card";
            let preview = document.createElement('div'); preview.className = "preview-container";
            
            if (media.type === 'video') {
              preview.innerHTML = `<video controls playsinline preload="metadata" referrerpolicy="no-referrer" poster="${media.thumb}"><source src="${media.url}" type="video/mp4"></video>`;
            } else {
              let img = document.createElement('img'); img.src = media.url; img.referrerPolicy = 'no-referrer';
              img.onerror = function() { if(!this.dataset.retried){ this.dataset.retried = '1'; this.src = 'https://wsrv.nl/?url=' + encodeURIComponent(media.url); }};
              preview.appendChild(img);
            }
            
            let row = document.createElement('div'); row.className = "action-row";
            
            let vBtn = document.createElement('a'); vBtn.href = media.url; vBtn.target = "_blank"; vBtn.className = "download-link"; vBtn.innerText = "👁️ View";
            
            let dBtn = document.createElement('a'); 
            dBtn.href = "#"; 
            dBtn.className = "download-link"; 
            dBtn.innerText = "⬇️ Save";
            
            dBtn.onclick = async (e) => { 
                e.preventDefault();
                let originalText = dBtn.innerText;
                dBtn.innerText = "⏳...";

                if(media.type === 'video') {
                    try {
                        let a = document.createElement('a');
                        a.href = media.url + "&dl=1"; 
                        a.setAttribute('download', `JL_Video_${Date.now()}.mp4`);
                        document.body.appendChild(a);
                        a.click();
                        document.body.removeChild(a);
                        dBtn.innerText = "✅ Force Sent";
                        setTimeout(() => dBtn.innerText = originalText, 2500);
                    } catch(err) {
                        window.open(media.url, '_blank');
                    }
                } else {
                    try {
                        let proxyUrl = 'https://corsproxy.io/?' + encodeURIComponent(media.url);
                        let res = await fetch(proxyUrl);
                        let blob = await res.blob();
                        let blobUrl = window.URL.createObjectURL(blob);
                        let a = document.createElement('a');
                        a.href = blobUrl;
                        a.download = `JL_Image_${Date.now()}.jpg`;
                        document.body.appendChild(a); a.click(); document.body.removeChild(a);
                        window.URL.revokeObjectURL(blobUrl);
                        dBtn.innerText = "✅ Saved";
                        setTimeout(() => dBtn.innerText = originalText, 2000);
                    } catch(err) {
                        window.open(media.url, '_blank');
                        dBtn.innerText = originalText;
                    }
                }
            };

            row.appendChild(vBtn); 
            row.appendChild(dBtn);
            card.appendChild(preview); 
            card.appendChild(row);

            if (media.type === 'video' && media.thumb) {
                let tBtn = document.createElement('a');
                tBtn.href = "#";
                tBtn.className = "thumb-btn";
                tBtn.innerText = "🖼️ Download Thumbnail";
                tBtn.onclick = async (e) => {
                    e.preventDefault();
                    let ogTxt = tBtn.innerText;
                    tBtn.innerText = "⏳ Pulling Cover...";
                    try {
                        let proxyUrl = 'https://corsproxy.io/?' + encodeURIComponent(media.thumb);
                        let res = await fetch(proxyUrl);
                        let blob = await res.blob();
                        let blobUrl = window.URL.createObjectURL(blob);
                        let a = document.createElement('a');
                        a.href = blobUrl;
                        a.download = `JL_Thumbnail_${Date.now()}.jpg`;
                        document.body.appendChild(a); a.click(); document.body.removeChild(a);
                        window.URL.revokeObjectURL(blobUrl);
                        tBtn.innerText = "✅ Saved!";
                        setTimeout(() => tBtn.innerText = ogTxt, 2000);
                    } catch(err) {
                        window.open(media.thumb, '_blank');
                        tBtn.innerText = ogTxt;
                    }
                };
                card.appendChild(tBtn);
            }

            resDiv.appendChild(card);
          });
        } else {
          resDiv.innerHTML = `<p style="grid-column: span 2; color: red;">${result.message}</p>`;
        }
      } catch (e) {
        resDiv.innerHTML = `<p style="grid-column: span 2; color: red;">Server is dead right now.</p>`;
      }
    }
  </script>
</body>
</html>
