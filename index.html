<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>J.L Downloader</title>
  <style>
    body { 
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
      background-color: #0f0f11; 
      color: #ffffff; 
      padding: 20px; 
      margin: 0;
    }
    
    .container {
      max-width: 600px;
      margin: 0 auto;
    }

    h2 {
      text-align: center;
      font-size: 28px;
      background: linear-gradient(90deg, #0095f6, #e1306c);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 30px;
    }

    .step-label {
      font-size: 14px;
      font-weight: bold;
      color: #aaa;
      margin-bottom: 8px;
      display: block;
    }

    input, textarea, button { 
      width: 100%; 
      margin-bottom: 25px; 
      padding: 15px; 
      border-radius: 12px; 
      border: 1px solid #333; 
      box-sizing: border-box; 
      font-size: 15px; 
      background-color: #1a1a1d;
      color: #fff;
      transition: all 0.3s ease;
    }

    input:focus, textarea:focus {
      outline: none;
      border-color: #0095f6;
      box-shadow: 0 0 8px rgba(0, 149, 246, 0.3);
    }

    input[readonly] { 
      background-color: #121215; 
      color: #888; 
      border-color: #222;
    }

    textarea { 
      height: 120px; 
      resize: none; 
      font-family: monospace;
      font-size: 13px;
    }

    .source-row {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      margin-bottom: 25px;
    }

    .source-row input {
      flex: 1;
      margin-bottom: 0;
    }

    .btn-copy {
      flex-shrink: 0;
      width: auto;
      padding: 15px 18px;
      margin-bottom: 0;
      background-color: #1a1a1d;
      border: 1px solid #333;
      border-radius: 12px;
      color: #aaa;
      font-size: 18px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn-copy:hover {
      border-color: #0095f6;
      color: #0095f6;
    }

    .btn-main { 
      background: linear-gradient(90deg, #0095f6, #007bb5); 
      color: white; 
      font-weight: bold; 
      font-size: 18px; 
      cursor: pointer; 
      border: none;
      box-shadow: 0 4px 15px rgba(0, 149, 246, 0.4);
    }

    .btn-main:hover {
      background: linear-gradient(90deg, #007bb5, #005f8e);
      box-shadow: 0 4px 20px rgba(0, 149, 246, 0.6);
    }

    .btn-main:active {
      transform: scale(0.98);
    }

    #results { 
      display: grid; 
      grid-template-columns: repeat(2, 1fr);
      gap: 15px; 
      margin-top: 20px; 
    }

    .media-card { 
      background: #1e1e24; 
      border-radius: 12px; 
      overflow: hidden; 
      border: 1px solid #333;
      display: flex;
      flex-direction: column;
      box-shadow: 0 4px 10px rgba(0,0,0,0.5);
    }

    .preview-container {
      width: 100%;
      height: 160px;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    .preview-container img { 
      width: 100%; 
      height: 100%; 
      object-fit: cover; 
    }

    .video-placeholder {
      text-align: center;
      color: #aaa;
    }

    .video-placeholder span {
      font-size: 40px;
    }

    .download-link { 
      display: block; 
      padding: 12px; 
      background: #0095f6; 
      color: white; 
      text-decoration: none; 
      font-weight: 600; 
      font-size: 14px;
      text-align: center;
      transition: background 0.2s;
    }

    .download-link:hover {
      background: #007bb5;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>J.L Downloader</h2>
    
    <label class="step-label">Step 1: Paste Instagram link (Post, Reel, or Story)</label>
    <input id="igLink" type="text" placeholder="https://instagram.com/..." oninput="generateSource()">
    
    <label class="step-label">Step 2: Open this link in a new tab and copy the page source</label>
    <div class="source-row">
      <input id="sourceLink" type="text" readonly placeholder="Waiting for link...">
      <button class="btn-copy" onclick="copySourceLink()" title="Copy to clipboard">⎘</button>
    </div>
    
    <label class="step-label">Step 3: Paste the raw page source here</label>
    <textarea id="rawCode" placeholder="Paste the raw page source here..."></textarea>
    
    <button class="btn-main" onclick="sendToBackend()">Scan For Media</button>

    <div id="results"></div>
  </div>

  <script>
    function generateSource() {
      const link = document.getElementById('igLink').value;
      if (link.includes('/stories/')) {
        document.getElementById('sourceLink').value = "view-source:" + link;
        return;
      }
      const shortcodeMatch = link.match(/(?:p|reel|tv)\/([a-zA-Z0-9_-]+)/);
      if (shortcodeMatch && shortcodeMatch[1]) {
        const variables = JSON.stringify({
          shortcode: shortcodeMatch[1],
          fetch_tagged_user_count: null,
          hoisted_comment_id: null,
          hoisted_reply_id: null
        });
        const encodedVars = encodeURIComponent(variables);
        document.getElementById('sourceLink').value = `https://www.instagram.com/graphql/query/?doc_id=8845758582119845&variables=${encodedVars}`;
      } else if (link.length > 0) {
        document.getElementById('sourceLink').value = "Please enter a valid Instagram link.";
      } else {
        document.getElementById('sourceLink').value = "";
      }
    }

    function copySourceLink() {
      const value = document.getElementById('sourceLink').value;
      if (!value || value === "Please enter a valid Instagram link.") return;
      navigator.clipboard.writeText(value).catch(() => {
        // Fallback for browsers that don't support the Clipboard API
        document.getElementById('sourceLink').select();
        document.execCommand('copy');
      });
    }

    async function sendToBackend() {
      const dumpedCode = document.getElementById('rawCode').value;
      const resultDiv = document.getElementById('results');
      
      if (!dumpedCode) {
        alert("Please paste the raw page source in Step 3 first.");
        return;
      }

      resultDiv.innerHTML = "<p style='grid-column: span 2; text-align: center;'>Scanning... ⏳</p>";

      try {
        const response = await fetch('http://de1.bot-hosting.net:21564/snatch', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ raw_data: dumpedCode })
        });
        
        const result = await response.json();
        resultDiv.innerHTML = "";
        
        if (result.status === "success" && result.links.length > 0) {
          result.links.forEach((link) => {
            const card = document.createElement('div');
            card.className = "media-card";

            const preview = document.createElement('div');
            preview.className = "preview-container";
            
            if (link.includes('.mp4')) {
              preview.innerHTML = `<div class="video-placeholder"><span>▶️</span><br>Video</div>`;
            } else {
              const img = document.createElement('img');
              img.src = link;
              img.alt = "Media preview";
              preview.appendChild(img);
            }
            
            const dlBtn = document.createElement('a');
            dlBtn.href = link;
            dlBtn.target = "_blank";
            dlBtn.className = "download-link";
            dlBtn.innerText = "⬇ Download";

            card.appendChild(preview);
            card.appendChild(dlBtn);
            resultDiv.appendChild(card);
          });
        } else {
          resultDiv.innerHTML = `<p style="grid-column: span 2; text-align: center; color: #ff4d4d;">${result.message}</p>`;
        }
      } catch (error) {
        resultDiv.innerHTML = `<p style="grid-column: span 2; text-align: center; color: #ff4d4d;">Could not reach the server. Please check that the server is running.</p>`;
      }
    }
  </script>
</body>
</html>
